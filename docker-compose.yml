# Dexiask — full stack. `cp .env.example .env`, fill secrets, then:
#   docker compose up --build
#
# Services: web · backend · engine · indexer · memory · qdrant · postgres.
# One shared `workspace` bind-mount (the codebase the agent reads & the indexer
# indexes) is mounted read-only into engine and indexer.
name: dexiask

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dexiask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dexiask}
      POSTGRES_DB: ${POSTGRES_DB:-dexiask}
    ports:
      - "${DEXIASK_POSTGRES_PORT:-25056}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dexiask}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "${DEXIASK_QDRANT_PORT:-25055}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local no-API-key mode: `COMPOSE_PROFILES=local` in .env enables this sidecar
  # and the fallback env below. Models are baked into the image at build time
  # (build args) — nothing is downloaded after the stack is up.
  ollama:
    build:
      context: ./ollama
      args:
        TEXT_MODEL: ${DEXIASK_LOCAL_TEXT_MODEL:-qwen2.5:1.5b}
        EMBED_MODEL: ${DEXIASK_LOCAL_EMBED_MODEL:-qwen3-embedding:0.6b}
        # Tuning baked into the TEXT model only (not global env), so the tiny
        # embedding model keeps its small default context. See ollama/Dockerfile
        # for why (KV-cache size; thread-contention slowdown on laptops).
        TEXT_CONTEXT: ${DEXIASK_OLLAMA_CONTEXT_LENGTH:-16384}
        TEXT_THREADS: ${DEXIASK_OLLAMA_THREADS:-4}
    profiles: ["local"]
    environment:
      OLLAMA_MODELS: /models
      # Keep models resident (text + embed loaded side by side).
      OLLAMA_KEEP_ALIVE: -1
      OLLAMA_MAX_LOADED_MODELS: 2
      # One slot → the llama.cpp prefix cache holds the conversation prefix
      # between turns, so turn N only evaluates the delta.
      OLLAMA_NUM_PARALLEL: 1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    # On an NVIDIA GPU host, uncomment to offload inference:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  engine:
    build:
      context: ./engine
    environment:
      # Optional when the `local` profile is enabled — the engine then falls
      # back to the Ollama sidecar. Required for Claude-quality answers.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional: point the Claude SDK at an Anthropic-compatible gateway
      # (e.g. OpenRouter → https://openrouter.ai/api). Blank = api.anthropic.com.
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      CLAUDE_ENGINE_MODEL: ${DEXIASK_MODEL:-claude-sonnet-5}
      # Local fallback (set only when the `local` profile is on): with no API
      # key the engine runs jobs against the Ollama sidecar's Anthropic-compat
      # API using this model instead of erroring. A real key always wins.
      CLAUDE_ENGINE_LOCAL_BASE_URL: ${COMPOSE_PROFILES:+http://ollama:11434}
      CLAUDE_ENGINE_LOCAL_MODEL: ${DEXIASK_LOCAL_TEXT_MODEL:-qwen2.5:1.5b}
      # Remote MCP tools exposed to the local model: '*' = all, or a comma
      # allowlist — small models often follow tools better with fewer of them.
      CLAUDE_ENGINE_LOCAL_REMOTE_TOOLS: ${DEXIASK_LOCAL_REMOTE_TOOLS:-*}
      # No OTel collector ships with the stack; disable the exporter to keep logs
      # clean. Set to "false" and add a collector to enable tracing.
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
    ports:
      - "${DEXIASK_ENGINE_PORT:-25053}:8080"
    volumes:
      - ${DEXIASK_WORKSPACE_PATH:-./sample-workspace}:/workspace
      - ./skills:/skills:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  indexer:
    build:
      context: ./indexer
    environment:
      # Optional when the `local` profile is enabled — the `auto` provider then
      # falls back to the Ollama sidecar for embeddings. A real key always wins.
      DEXIASK_VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      DEXIASK_QDRANT_URL: ${DEXIASK_QDRANT_URL:-http://qdrant:6333}
      DEXIASK_EMBEDDING_PROVIDER: ${DEXIASK_EMBEDDING_PROVIDER:-auto}
      DEXIASK_EMBEDDING_MODEL: ${DEXIASK_EMBEDDING_MODEL:-voyage-code-3}
      DEXIASK_EMBEDDING_DIM: ${DEXIASK_EMBEDDING_DIM:-1024}
      DEXIASK_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEXIASK_OLLAMA_BASE_URL: ${COMPOSE_PROFILES:+http://ollama:11434}
      DEXIASK_OLLAMA_EMBEDDING_MODEL: ${DEXIASK_LOCAL_EMBED_MODEL:-qwen3-embedding:0.6b}
      # Generated domain-knowledge docs (LLM), embedded as content_type=doc and
      # searchable alongside code. Off by default; needs an Anthropic key.
      DEXIASK_ENABLE_DOMAIN_DOCS: ${DEXIASK_ENABLE_DOMAIN_DOCS:-false}
      DEXIASK_DOMAIN_DOCS_MODEL: ${DEXIASK_DOMAIN_DOCS_MODEL:-claude-opus-4-8}
      DEXIASK_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Shared secret with the backend → enables per-user repo gating (the indexer
      # validates each caller's GitHub token itself). Empty = no gating.
      DEXIASK_INTERNAL_TOKEN: ${DEXIASK_INTERNAL_TOKEN:-}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
    ports:
      - "${DEXIASK_INDEXER_PORT:-25054}:8080"
    volumes:
      - ${DEXIASK_WORKSPACE_PATH:-./sample-workspace}:/workspace:ro
      - indexer-data:/var/lib/dexiask-indexer
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  memory:
    build:
      context: ./memory
    environment:
      DEXIASK_MEMORY_ROOT: /memory
      DEXIASK_MEMORY_MCP_SELF_URL: ${DEXIASK_MEMORY_MCP_SELF_URL:-http://memory:8080/mcp}
      DEXIASK_AGENT_URL: ${DEXIASK_AGENT_URL:-http://engine:8080}
      DEXIASK_DREAM_MODEL: ${DEXIASK_DREAM_MODEL:-${DEXIASK_MODEL:-claude-sonnet-5}}
      DEXIASK_DREAM_INTERVAL: ${DEXIASK_DREAM_INTERVAL:-1h}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
    volumes:
      - memory-data:/memory
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DEXIASK_DB_DSN: ${DEXIASK_DB_DSN:-postgres://dexiask:dexiask@postgres:5432/dexiask?sslmode=disable}
      DEXIASK_AGENT_URL: ${DEXIASK_AGENT_URL:-http://engine:8080}
      DEXIASK_INDEXER_URL: ${DEXIASK_INDEXER_URL:-http://indexer:8080}
      DEXIASK_INDEXER_MCP_URL: ${DEXIASK_INDEXER_MCP_URL:-http://indexer:8080/mcp}
      DEXIASK_MEMORY_URL: ${DEXIASK_MEMORY_URL:-http://memory:8080}
      DEXIASK_MEMORY_MCP_URL: ${DEXIASK_MEMORY_MCP_URL:-http://memory:8080/mcp}
      # Shared secret with the indexer for per-user repo gating (see indexer).
      DEXIASK_INTERNAL_TOKEN: ${DEXIASK_INTERNAL_TOKEN:-}
      DEXIASK_MODEL: ${DEXIASK_MODEL:-claude-sonnet-5}
      DEXIASK_MAX_TOKENS: ${DEXIASK_MAX_TOKENS:-}
      DEXIASK_WORKSPACE_MOUNT: /workspace
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      # GitHub OAuth (optional). When client id/secret are set, login is enforced;
      # otherwise the backend runs in dev-fallback mode (single local user).
      DEXIASK_GITHUB_CLIENT_ID: ${DEXIASK_GITHUB_CLIENT_ID:-}
      DEXIASK_GITHUB_CLIENT_SECRET: ${DEXIASK_GITHUB_CLIENT_SECRET:-}
      DEXIASK_OAUTH_CALLBACK_URL: ${DEXIASK_OAUTH_CALLBACK_URL:-http://localhost:25051/api/auth/callback}
      DEXIASK_SESSION_SECRET: ${DEXIASK_SESSION_SECRET:-}
      DEXIASK_TOKEN_ENC_KEY: ${DEXIASK_TOKEN_ENC_KEY:-}
      DEXIASK_WEB_BASE_URL: ${DEXIASK_WEB_BASE_URL:-http://localhost:25051}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
    ports:
      - "${DEXIASK_BACKEND_PORT:-25052}:8080"
    volumes:
      - ${DEXIASK_WORKSPACE_PATH:-./sample-workspace}:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      engine:
        condition: service_started
      memory:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
    environment:
      GO_BACKEND_URL: http://backend:8080
      # Mirror the backend's auth mode so the web login gate matches. Set to
      # "true" when a GitHub OAuth app is configured.
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
    ports:
      - "${DEXIASK_WEB_PORT:-25051}:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres-data:
  qdrant-data:
  indexer-data:
  memory-data:
